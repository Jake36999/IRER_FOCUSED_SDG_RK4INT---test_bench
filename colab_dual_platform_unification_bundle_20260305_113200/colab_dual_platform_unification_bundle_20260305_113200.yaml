  3. The Remedial Mode: Topological UI Layout and Navigation
  Activating Remedial Mode initiates a "Telescope View" shift. The primary simulation dashboard recedes, replaced by a specialized investigation deck. This shift is a strategic narrowing of focus, transforming the UI into a dedicated Action Space for system stabilization.
  3.1 Header: Diagnostic Context Bar
