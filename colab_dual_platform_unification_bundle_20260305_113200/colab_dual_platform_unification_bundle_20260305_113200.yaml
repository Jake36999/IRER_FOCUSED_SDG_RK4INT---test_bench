  Validation protocols must measure "Mental Load" to prevent information saturation. A validated High-Performance HMI utilizes a three-level hierarchy of information:
     1. Level 1: High-level Overview: Identifying that a problem exists.
     2. Level 2: Detailed Identification: Determining the specific cause of the problem.
