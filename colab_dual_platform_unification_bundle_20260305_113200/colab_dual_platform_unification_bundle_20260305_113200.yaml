        "core_equation": "S-NCGL master equation: governs resonance density (rho) and phase (omega) evolution. Discretized for numerical integration.",
        "kernels": [
          "get_gradients_periodic(f, dx): Computes periodic gradients for field f.",
          "laplacian_periodic(f, dx): Computes periodic Laplacian for field f.",
          "covariant_laplacian(field, omega, grad_omega, dx): Covariant Laplacian for curved geometry.",
          "solve_geometry_proxy(rho, params): Solves geometry proxy for simulation domain.",
          "spectral_radius_estimate(params, rho_max): Estimates spectral radius for stability checks.",
          "dt_stability_bound(params, rho_max): Computes maximum stable dt for integration."
        ],
        "numerical_methods": "Explicit time-stepping with adaptive dt, stability checks, and periodic boundary conditions. Uses JAX for vectorized computation."
      },
      "parameter_definitions": {
        "SimParams": {
          "fields": [
            {"name": "alpha", "description": "Coupling strength, controls resonance interaction."},
            {"name": "rho_max", "description": "Maximum resonance density, sets upper bound for field."},
            {"name": "dt", "description": "Time step, dynamically adapted for stability."},
            {"name": "dx", "description": "Spatial discretization step."},
            {"name": "n_steps", "description": "Number of simulation steps."},
            {"name": "geometry", "description": "Domain geometry (e.g., periodic, proxy)."}
          ],
          "validation": "Parameters are clamped and validated for physical plausibility in validate_and_clamp_params()."
        },
        "SimState": {
          "fields": [
            {"name": "rho", "description": "Resonance density field, main simulation variable."},
            {"name": "omega", "description": "Phase field, coupled to rho evolution."},
            {"name": "A", "description": "Auxiliary field for geometry or stability calculations."}
          ],
          "immutability": "SimState is a Pytree, ensuring immutable state for reproducibility."
        }
      },
      "simulation_workflow": {
        "steps": [
          "Receive manifest and parameters from orchestrator.",
          "Validate and clamp parameters.",
          "Initialize SimState (rho, omega, A).",
          "Iteratively step physics: compute time derivatives, update fields, check for instability (NaN/Inf, divergence).",
          "Stream or store state matrices as artifacts.",
          "Upload artifact to MinIO for validation."
        ],
        "extensibility": "Physics kernels and models are modular; new equations or geometries can be added by extending kernels.py and models.py."
      },
      "validation_and_diagnostics": {
        "criteria": [
          "H-Norm < 0.09 for artifact acceptance.",
          "Valid Betti numbers (TDA) and entropy within expected range.",
          "No NaN/Inf or instability detected during simulation."
        ],
        "diagnostics": [
          "calculate_h_norm(omega, rho, params): Computes H-Norm for acceptance.",
          "compute_tda_betti_numbers(rho_field, threshold): Computes Betti numbers for topology validation.",
          "perform_multi_ray_fft(rho_field, num_rays): FFT for spectral analysis.",
          "check_invariance.py: Validates conservation and invariance properties."
        ],
        "test_coverage": "Unit tests for solver, kernels, and analytics; edge cases and error handling need expansion."
      }
    },
