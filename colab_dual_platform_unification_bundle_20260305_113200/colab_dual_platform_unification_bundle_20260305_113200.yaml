    """
    worker/ir_physics/solver.py
    The Scanning Engine.
    """
    import jax
    from functools import partial
    from .models import SimState, SimParams
    from .kernels import step_physics, get_green_function
    
    @partial(jax.jit, static_argnames=['total_steps', 'grid_size', 'use_adaptive_dt', 'fully_coupled_geometry'])
    def run_simulation_scan(
        initial_state: SimState, 
        params: SimParams, 
        total_steps: int,
        grid_size: int,
        use_adaptive_dt: bool = False,
        fully_coupled_geometry: bool = False
    ):
        """
        Executes the full simulation trajectory.
        Args:
            use_adaptive_dt: if True, use curvature-adaptive dt
            fully_coupled_geometry: if True, recompute geometry at each RK4 substep
        """
        # 1. Precompute static Green's function (FFT)
        splash_green_fn = get_green_function(
            (grid_size, grid_size, grid_size), 
            params.dx, 
            params.sigma_k
        )
    
        # 2. Define the Scan Body
        def scan_body(carry: SimState, _):
            new_state = step_physics(
                carry, params, splash_green_fn,
                use_adaptive_dt=use_adaptive_dt,
                fully_coupled_geometry=fully_coupled_geometry
            )
            return new_state, new_state.h_norm
    
        # 3. Execute Scan
        final_state, h_norm_history = jax.lax.scan(
            scan_body,
            initial_state,
            None,
            length=total_steps
        )
        return final_state, h_norm_history
  
