Content: |
  # IRER V14 Data Module
  
  This directory contains resources related to the data management of the IRER V14 architecture. 
  
  ## PostgreSQL Migration
  
  The `postgres_migration.sql` file includes the SQL commands necessary to migrate the database from SQLite to PostgreSQL for the Knowledge Extraction Log (KEL). This migration is crucial for ensuring scalable storage and efficient data retrieval.
  
  ## Usage
  
  Ensure that you execute the migration script in your PostgreSQL environment to set up the necessary database structure for the project. 
  
  For any additional data-related functionalities or queries, refer to the respective modules and documentation within the project.

--- FILE: JAX_irer-v14/data/postgres_migration.sql ---
Size: 670 bytes
Summary: (none)
Content: |
  -- SQL commands to migrate from SQLite to PostgreSQL for the Knowledge Extraction Log (KEL)
  
  -- Create the new table structure in PostgreSQL
  CREATE TABLE kel (
      id SERIAL PRIMARY KEY,
      job_id VARCHAR(255) NOT NULL,
      result JSONB NOT NULL,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
  );
  
  -- Insert data from the old SQLite database
  INSERT INTO kel (job_id, result, created_at, updated_at)
  SELECT job_id, result, created_at, updated_at FROM old_kel_table; 
  
  -- Drop the old table if necessary
  DROP TABLE IF EXISTS old_kel_table; 
  
  -- Add any necessary indexes
  CREATE INDEX idx_kel_job_id ON kel (job_id);

