  	Target files for AST structural and secret entropy validation.
  	4. Static Analysis Engine: AST-Driven DNA Validation
  Static analysis in IRER is governed by Axiom 3: Parsimony. Rather than using brittle regex, the engine parses the Python Abstract Syntax Tree (AST) to understand logical intent.
  The core analysis module focuses on "Blueprint Validation," identifying drift from the system's "Golden State." By walking the AST, the engine achieves syntactic certainty:
  1. Component Profiling: Identifies all ClassDef and FunctionDef nodes, comparing them against the YAML blueprint (e.g., verifying IRERProcessor signatures).
  2. Axiom 2: Sanitization: Implements the security kernel to detect DANGEROUS_PATTERNS. It distinguishes between a string literal "eval" and the execution of the ast.Call node for the eval() function.
  3. Entropy Mapping: Analyzes variable assignments. If the entropy of an assignment exceeds the threshold (4.5), it is flagged as a potential credential leak and redacted in the final report to prevent further exposure.
  This layer ensures that the architectural hierarchy is maintained and that forbidden logic—such as dynamic execution or unauthorized I/O operations—is blocked before deployment.
  5. AI-Powered Verification & Report Orchestration
  For "Red Tier" files—those exhibiting extreme complexity or high-risk keywords—the scanner orchestrates a 3-Round AI Analysis pipeline using local LLMs (typically deepseek-r1-0528-qwen3-8b via LM Studio).= [REDACTED_HIGH_ENTROPY]
