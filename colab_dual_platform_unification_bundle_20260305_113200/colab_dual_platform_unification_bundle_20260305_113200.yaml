          except subprocess.CalledProcessError as e:
              logging.error(f"⚠️ [PREDATOR MODE] Sweep aborted or collapsed (Code {e.returncode}).")
          finally:
              if os.path.exists(target_file):
                  try: os.remove(target_file)
