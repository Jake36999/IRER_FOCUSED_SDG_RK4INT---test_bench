  Centralization facilitates the middleware-hub's ability to proxy requests to LM Studio and ensures the physics-worker identifies itself correctly within the task pool.
  6. Resilience Orchestration and Health Verification
  In distributed systems, a "Strictly Ordered Startup" is vital to prevent service-start cascades. The IRER Validation Suite must initialize in a specific sequence= [REDACTED_HIGH_ENTROPY]
  Health Check Requirements
  * redis-bus: Verified via redis-cli ping.
  * middleware-hub= [REDACTED_HIGH_ENTROPY]
  To enforce these lifecycle dependencies, the orchestration layer utilizes depends_on with the condition: service_healthy flag. This requires Docker Compose V2 or higher for native support of health-based dependencies.
  7. Integrated Scaffolding: The Docker Compose Manifest
  The following docker-compose.yml manifest is the actionable realization of the entire management layer strategy, integrating the Binary Guard, network sequestration, and ordered orchestration.
  version: '3.8'
  
  
  services:
    redis-bus:
      image: redis:7-alpine
      container_name: redis-bus
      networks:
        - irer-internal
      volumes:
        - redis_data:/data
      healthcheck:
        test: ["CMD", "redis-cli", "ping"]
        interval: 5s
        timeout: 3s
        retries: 5
  
  
    middleware-hub:
      build:
        context: ./backend-hub
      container_name: middleware-hub
      ports:
        - "8000:8000"
      env_file: .env
      volumes:
        - ./irer-v14:/mnt/source:ro
        - irer_scans:/app/bundler_scans
      networks:
        - irer-internal
      depends_on:
        redis-bus:
          condition: service_healthy
      healthcheck:
        # Requires curl installed in the backend-hub image
        test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
        interval: 10s
        timeout: 5s
        retries: 3
  
  
    physics-worker:
      build:
        context: ./worker-core
      container_name: physics-worker
      env_file: .env
      networks:
        irer-internal:
          ipv4_address: 172.20.0.10
      # Security: Explicitly isolates worker from external traffic
      dns:
        - 127.0.0.1
      depends_on:
        middleware-hub:
          condition: service_healthy
  
  
    workbench-ui:
      build:
        context: ./frontend
      container_name: workbench-ui
      ports:
        - "3000:3000"
      env_file: .env
      networks:
        - irer-internal
      depends_on:
        middleware-hub:
          condition: service_healthy
  
  
  networks:
    irer-internal:
      driver: bridge
      ipam:
        config:
          - subnet: 172.20.0.0/16
  
  
  volumes:
    redis_data:
    irer_scans:
  
  
