  2. The Sidebar Refactor: Implementing Implicit State via Compound Components
  In professional UI development, moving away from "massive configuration objects" is essential for layout flexibility. By utilizing Compound Components, we encapsulate the navigation logic while allowing for a declarative DSL. This approach provides the flexibility to inject icons, headers, or dividers anywhere in the layout without breaking core logic. Furthermore, this pattern enables Conditional Rendering within the child components—allowing SidebarItem to change its own icon or symbol based on the isActive state without requiring the parent to manage those specific visual details.
  Implementation: Sidebar.tsx and SidebarItem.tsx
  import React, { createContext, useContext, useState, ReactNode } from 'react';
  
  
  const SidebarContext = createContext<{
    activeId: string | null;
    setActiveId: (id: string) => void;
  }>({ activeId: null, setActiveId: () => {} });
  
  
  // The Parent Container: Manages implicit state
  export const Sidebar: React.FC<{ children: ReactNode }> = ({ children }) => {
    const [activeId, setActiveId] = useState<string | null>(null);
  
  
    return (
      <SidebarContext.Provider value={{ activeId, setActiveId }}>
        <nav className="irer-sidebar-nav bg-slate-900 p-4 border-r border-slate-800">
          {children}
        </nav>
      </SidebarContext.Provider>
    );
  };
  
  
  // The Compound Child: Consumes context and renders declaratively
  export const SidebarItem: React.FC<{ id: string; children: ReactNode; icon?: ReactNode }> = ({ id, children, icon }) => {
    const { activeId, setActiveId } = useContext(SidebarContext);
    const isActive = activeId === id;
  
  
    return (
      <div 
        className={`sidebar-item flex items-center p-2 cursor-pointer transition-colors ${isActive ? 'bg-blue-600 text-white' : 'text-slate-400'}`}
        onClick={() => setActiveId(id)}
      >
        {/* Conditional Rendering: Logic is local to the component, reducing entropy */}
        {icon && <span className={`mr-2 ${isActive ? 'opacity-100' : 'opacity-50'}`}>{icon}</span>}
        <span className="font-medium">{children}</span>
        {/* ISA-101 symbol support: Active items get a specific marker for color-blind accessibility */}
        {isActive && <div className="ml-auto w-2 h-2 bg-white rounded-full" aria-hidden="true" />}
      </div>
    );
  };
  
  
  // Example Usage: A declarative DSL for the Sovereign Auditor
  const SidebarUsage = () => (
    <Sidebar>
      <header className="text-xs font-bold text-slate-500 uppercase mb-4">Core Telemetry</header>
      <SidebarItem id="physics" icon={<PhysicsIcon />}>Simulation Scans</SidebarItem>
      <hr className="my-2 border-slate-800" />
      <SidebarItem id="kel" icon={<HistoryIcon />}>Remedial Manifold (KEL)</SidebarItem>
    </Sidebar>
  );
