  │   └── utils/           # Shannon entropy and AST complexity logic
  └── styles/
      └── themes/          # Terminal-mode color definitions
  
  
  The inclusion of src/lib/constants is mandatory, as it serves as the frontend single-source-of-truth for DANGEROUS_PATTERNS (e.g., eval(), exec(), os.system) and DEFAULT_IGNORE_DIRS.
  4. High-Density UI Component Deep-Dive
  Four primary components drive the "God View," each mapped to specific technical breakthroughs in the backend engine.
  * BinaryGuardExplorer: A performance-tuned file tree that implements Axiom 2 (Sanitization). It utilizes the expanded DEFAULT_IGNORE_DIRS list—filtering over 35+ critical noise sources including node_modules, site-packages, and .venv. This component highlights "Red Tier" files containing high-entropy strings or patterns defined in the SecurityKernel.
  * MonitorDashboard: A responsive grid tracking the Hamiltonian Norm of the system. In this context, the Hamiltonian is visualized as the ratio of AST Complexity (classes/functions detected by the SemanticAnalyzer) against raw File Size. Sudden spikes in complexity indicate areas where "Axiom 3 (Parsimony)" may be compromised.
  * DriftRadar: A polar chart tracking Entropy Divergence. Using the calculate_entropy logic from the source, the radar identifies files where Shannon entropy exceeds the 4.5 threshold, signaling potential "Golden State" divergence through hardcoded secrets or PEM-encoded private keys.
  * TelescopeModal: A specialized split-screen debugger for agentic resolution. It presents the raw file content alongside the structural summaries generated by the SemanticAnalyzer class, specifically surfacing the functions and classes extracted during the Round 1 analysis phase.
  5. Real-Time Telemetry & State Management Logic
  The stability of the interface depends on the robust management of high-frequency data streams.
  * The useTelemetryStream Hook: This hook manages the EventSource connection to the backend. It features a critical Validation Layer to prevent the "Silent Failure" bugs found in earlier iterations. By explicitly validating the incoming JSON structure (checking the data field in chunks vs. the files array), it ensures telemetry remains synchronized even when the backend is under heavy load.
  * System Status Bar (Agent Pulse): A persistent layout element that tracks the health of the 3-round AI pipeline. It monitors the LM Studio Connection status and provides real-time alerts for Round 2 Stability, specifically tracking VRAM and memory usage during high-context consolidation steps.
  6. Design System: The Low-Latency Aesthetic
  The design system is optimized for high-stakes monitoring, focusing on ocular ergonomics in dark-mode environments.
