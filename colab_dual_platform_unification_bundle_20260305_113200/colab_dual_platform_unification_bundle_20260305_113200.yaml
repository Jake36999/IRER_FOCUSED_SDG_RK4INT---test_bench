  SVG Component Code Snippet: TelemetryChart.tsx
  
  
  import React, { useMemo } from 'react';
  import { motion } from 'framer-motion'; // Implementation of Spring Constants
  
  
  const TelemetryChart = ({ data, width = 500, height = 100 }) => {
    // Normalize coordinates for SVG viewport to maintain visual fidelity
    const points = useMemo(() => {
      const maxVal = Math.max(...data.map(d => d.h_norm), 1);
      return data.map((d, i) => ({
        x: (i / (data.length - 1)) * width,
        y: height - (d.h_norm / maxVal) * height
      }));
    }, [data, width, height]);
  
  
    const pathData = `M ${points.map(p => `${p.x},${p.y}`).join(' L ')}`;
  
  
    return (
      <svg viewBox={`0 0 ${width} ${height}`} className="hmi-svg-engine">
        <defs>
          <filter id="divergence-blur">
            <feGaussianBlur in="SourceGraphic" stdDeviation="3" />
          </filter>
        </defs>
        <motion.path
          d={pathData}
          fill="none"
          stroke="#FF0000" // ISA-101 Critical Red
          strokeWidth="2"
          filter="url(#divergence-blur)"
          transition={{ type: "spring", stiffness: 170, damping: 26 }}
        />
      </svg>
    );
  };
  
  
  
  
