    // Global Hotkey Listener for "Emergency Exit"
    useEffect(() => {
      const handleKeyDown = (e: KeyboardEvent) => {
        if (e.key === 'Escape') {
          // Logic to kill deep-dive modals
          console.log('AXIOM 2: Emergency Exit Triggered');
