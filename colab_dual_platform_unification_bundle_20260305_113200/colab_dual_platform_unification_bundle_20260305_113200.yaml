  * Metrics: A real-time progress bar for "Vectors Loaded," a Red Badge indicator for "Unindexed Friction Points," and a version check for "Active JAX Versioning" (Targeting 0.4.20).
  * Global Search & Sensitivity: A high-density search input for raw error traces coupled with a precision Sensitivity Slider. This slider allows operators to adjust the Semantic Threshold (0.4 to 0.8), controlling the strictness of the vector search during live investigations.
  3.2 Left Pane: The Friction Stream
  The Friction Stream is a vertical, scrollable feed of system stress points. It categorizes anomalies into actionable cards.
  * Card Design: Each card displays a deterministic Hash UID, a high-resolution timestamp, and a Source Notebook tag (e.g., Category_B_Sec_2).
  * Filter Logic: Operators can toggle views between [All], [Unindexed] (New anomalies requiring triage), and [Urgent] (Critical mathematical divergences).
  3.3 Center/Right Split: The Remediation Manifold
  This is the primary Action Space. When a card is selected from the stream, a Monaco Diff Editor occupies the central view. This allows for a side-by-side comparison between the "Current Broken Code" and the "Historical Remedial Fix" extracted from the KEL. Operators can audit the fix before hitting the "Apply Fix" button to trigger the ai_orchestrator.py stabilization pipeline.
  4. The Knowledge Extraction Log (KEL): Backend Logic and Vector Integration
  The KEL utilizes "Librarian" logic to transform years of failed iterations into a "gold mine" of negative training data. It extracts "Friction Points" and "Remedial Processes" from legacy Jupyter notebooks and live transcripts.
  To ensure strict data sovereignty, the Librarian manages specific staging areas on the local filesystem:
