  Error communication is a defining moment for operational reliability. Systems must be validated against the following Error Message Checklist:
     * ☐ Visibility: Is the message clear and placed at the point of action?
     * ☐ Precision: Does it avoid vague codes (e.g., "Error 311") in favor of specific descriptions?
     * ☐ Constructive Help: Does it tell the user exactly how to fix the problem?
