  GLSL Shader Snippet (Instability-Driven Aurora)
  
  
  // monitor_aurora.frag
  precision mediump float;
  uniform float u_time;
  uniform float u_entropy;    // Driven by rho_max / h_norm_val
  varying vec2 v_uv;
  
  
  void main() {
      // ISA-101 Color Hierarchy: Neutral Gray -> Yellow (Deviated) -> Red (Critical)
      vec3 neutral = vec3(0.15, 0.15, 0.17); 
      vec3 warning = vec3(0.9, 0.8, 0.1); 
      vec3 critical = vec3(0.8, 0.1, 0.1);
      
      vec3 alert_mix = mix(warning, critical, step(0.7, u_entropy));
      vec3 final_color = mix(neutral, alert_mix, u_entropy);
      
      gl_FragColor = vec4(final_color, 1.0);
  }
  
  
  
  
