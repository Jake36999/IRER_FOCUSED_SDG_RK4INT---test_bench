  	None
  	Isolated. High-security internal bus; inaccessible from the host.
  	Only the UI and API gateways are exposed. This creates a hardened perimeter that transitions from network-level security to the physical data layer.
  4. Volume Management and the "Binary Guard" Protocol
  The "Binary Guard" is a forensic requirement within the IRER Validation Suite. It ensures that the scanning engine does not inadvertently become a vector for code modification. This is critical when processing the Directory Bundler v4.5 workloads, which reduce massive directory structures into specialized security manifests.
  Volume Mapping Architecture
  * Source Code Mount (The Binary Guard): The local ./irer-v14 directory is mapped to /mnt/source within the middleware-hub. This mount MUST be set to ro (Read-Only). This physical guard ensures that the target codebase remains immutable during AST analysis.
  * Scan Persistence: A named volume, irer_scans, is mapped to /app/bundler_scans. This ensures that scan manifests (manifest.json), directory trees, and chunked analysis files are persisted across container restarts.
  * Bus State Persistence: The redis_data volume ensures that the task queues and pub/sub history are maintained if the bus container is cycled.
  This strategy mitigates the risk of write-access in a scanning environment while ensuring that valuable AI analysis results are not lost when containers are destroyed.
  5. Environmental Synchronization and Configuration
  Adhering to "Infrastructure as Code" (IaC) principles, we centralize the suite's environment via a .env file. This synchronization allows for seamless transitions between local development and production LAN environments.
  Representative Environmental Configuration (.env.example)
