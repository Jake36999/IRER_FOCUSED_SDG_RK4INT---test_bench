  	Python / Venv
  	.venv, venv, env, virtualenv, .virtualenv, .envs, __pycache__, .pytest_cache, .mypy_cache, site-packages, dist-packages
  	Prevents library bloat; ignores non-source third-party dependencies.
  	Build & Git
  	.git, .git/objects, .git/refs, .git/hooks, dist, build, target, vendor, wheelhouse
  	Excludes massive binary blobs and previous build artifacts.
  	System & Conda
  	lib, lib64, bin, share, .local, conda, opt
  	Ignores OS-level binaries and global environment configs.
  	Red Tier (High Risk)
