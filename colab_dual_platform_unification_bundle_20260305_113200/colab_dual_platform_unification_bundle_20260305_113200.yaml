                  Files
                </TabsTrigger>
                <TabsTrigger value="telemetry" className="data-[state=active]:bg-slate-800 data-[state=active]:text-white">
                  <Activity className="w-3.5 h-3.5 mr-2" />
                  Signals
                </TabsTrigger>
              </TabsList>
            </div>
  
