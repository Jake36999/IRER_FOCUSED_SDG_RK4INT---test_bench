              break
  
          # Safely pop the top target
          target = queue.pop(0)
          
          # Atomically rewrite the remaining queue
          try:
              if queue:
                  tmp_file = queue_file + ".tmp"
                  with open(tmp_file, 'w') as f:
                      json.dump(queue, f, indent=4)
                  os.replace(tmp_file, queue_file)
              else:
